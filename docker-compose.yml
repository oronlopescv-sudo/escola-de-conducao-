services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoescola
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autoescola}
      POSTGRES_DB: autoescola
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoescola"]
      interval: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://autoescola:${DB_PASSWORD:-autoescola}@db:5432/autoescola?schema=public
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
    ports:
      - "3000:3000"

volumes:
  pgdata:
