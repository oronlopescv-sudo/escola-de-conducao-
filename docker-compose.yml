services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-escolaconducao}
      MYSQL_USER: mysqlescola
      MYSQL_PASSWORD: ${DB_PASSWORD:-escolaconducao}
      MYSQL_DATABASE: ESCOLA
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-escolaconducao}"]
      interval: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://mysqlescola:${DB_PASSWORD:-escolaconducao}@db:3306/ESCOLA
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
    ports:
      - "3000:3000"

volumes:
  mysqldata:
